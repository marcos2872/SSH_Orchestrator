name: 🚀 Publish All Platforms
on:
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*.*.*'     # Auto on tag v1.0.0

permissions:
  contents: write  # For creating releases

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest]
        # platform: [macos-latest, ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.platform }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
      GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies (ubuntu)
      if: matrix.platform == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y libwebkit2gtk-4.1-dev \
          build-essential curl wget libssl-dev libgtk-3-dev \
          libayatana-appindicator3-dev librsvg2-dev libfuse2
    
    - name: Install frontend deps
      run: pnpm install
    
    - name: 🚀 Build Tauri
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tagName: ${{ github.ref_name }}
        releaseName: 'SSH Orchestrator v${{ github.ref_name }}'
        releaseBody: '## Instaláveis para todas plataformas!'
        releaseDraft: true
        prerelease: false
        
        # Windows
        # windowsTarget: 'nsis'  # .exe instalador
        
        # macOS  
        # macOSTarget: 'dmg'     # .dmg
        
        # Linux
        linuxTarget: 'AppImage,debian'  # .AppImage + .deb
